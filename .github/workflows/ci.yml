name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  backend-tests:
    name: Backend — Lint & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Lint — Ruff
        run: |
          cd backend
          ruff check .

      - name: Lint — Black
        run: |
          cd backend
          black --check .

      - name: Lint — mypy
        run: |
          cd backend
          mypy app/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5433/test_db
          JWT_SECRET: test-secret-key-for-ci
          ANTHROPIC_API_KEY: mock-key
          ENVIRONMENT: test
        run: |
          cd backend
          pytest --cov=app --cov-report=xml -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend

  frontend-lint:
    name: Frontend — Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Lint — ESLint
        run: |
          cd frontend
          npm run lint

      - name: Tests
        run: |
          cd frontend
          npm test -- --passWithNoTests

  # e2e-tests: habilitado na Sprint 4 quando os testes Playwright estiverem implementados
